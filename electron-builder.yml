appId: com.laralens.app
productName: LaraLens
copyright: Copyright (c) 2026 LaraLens
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
asar: true
extraResources:
  - from: resources/icon.png
    to: icon.png
win:
  icon: resources/icon.ico
  target:
    - nsis
  # GitHub's release-asset download URLs convert spaces in the filename to
  # dots, but electron-updater requests the URL literally from latest.yml.
  # If the installer keeps its default name ("LaraLens Setup 1.0.x.exe"),
  # the URL space becomes %20 and 404s. Pin the NSIS artifact name to a
  # dot-joined form so the on-disk file, the latest.yml entry, and the
  # GitHub download URL all match exactly.
nsis:
  artifactName: "LaraLens.Setup.${version}.${ext}"
mac:
  icon: resources/icon.icns
  target:
    - dmg
    - zip
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
    - rpm
  category: Development
  maintainer: LaraLens
publish:
  provider: github
  owner: RyderAsKing
  repo: LaraLens
  # Use the same GITHUB_TOKEN the release workflow already has; required
  # because the repo is private-capable and to avoid anonymous rate limits.
  # In CI this is provided automatically; locally set GH_TOKEN in env.
  # publishAutoUpdate: true is the default, so latest*.yml are emitted.
